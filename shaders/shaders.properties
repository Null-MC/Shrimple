screen.columns=2
screen=\
    [DEBUG] <profile> \
    <empty> <empty> \
    [WORLD] [MATERIAL] \
    [LIGHTING] [SHADOWS] \
    [EFFECTS] [POST] \
    [MODS]

screen.DEBUG=\
    DEBUG_VIEW DEBUG_WHITEWORLD

screen.WORLD=\
    [WORLD_OUTLINE] [WORLD_OVERWORLD] \
    WIND_ENABLED [WORLD_NETHER] \
    <empty> [WORLD_END]

screen.WORLD_OUTLINE=\
    BLOCK_OUTLINE_TYPE BLOCK_OUTLINE_COLOR_R \
    BLOCK_OUTLINE_WIDTH BLOCK_OUTLINE_COLOR_G \
    BLOCK_OUTLINE_EMISSION BLOCK_OUTLINE_COLOR_B

screen.WORLD_OVERWORLD=\
    OVERWORLD_SKY OVERWORLD_NIGHT_BRIGHTNESS

screen.WORLD_NETHER=\
    NETHER_BRIGHTNESS

screen.WORLD_END=\
    <empty>

screen.MATERIAL=\
    MATERIAL_FORMAT [MATERIAL_PARALLAX] \
    [MATERIAL_EMISSION]

screen.MATERIAL_PARALLAX=\
    MATERIAL_PARALLAX_ENABLED MATERIAL_PARALLAX_TYPE \
    MATERIAL_PARALLAX_DEPTH MATERIAL_PARALLAX_SAMPLES

screen.MATERIAL_EMISSION=\
    MATERIAL_EMISSION_SCALE MATERIAL_EMISSION_POWER

screen.LIGHTING=\
    LIGHTING_MODE LIGHTING_HAND \
    LIGHTING_COLORED LIGHTING_REFLECT_ENABLED \
    LIGHTING_VOXEL_SIZE LIGHTING_MIN

screen.SHADOWS=\
    SHADOWS_ENABLED SHADOW_CLOUDS \
    SHADOW_RESOLUTION shadowDistance \
    SHADOW_PCF_SAMPLES sunPathRotation \
    SHADOW_AMBIENT

screen.EFFECTS=\
    [EFFECT_BLOOM] [EFFECT_SSAO]

screen.EFFECT_SSAO=\
    SSAO_ENABLED SSAO_SAMPLES

screen.EFFECT_BLOOM=\
    BLOOM_ENABLED BLOOM_STRENGTH \
    <empty> BLOOM_LEVELS

screen.POST=\
    [TAA] TONEMAP_ENABLED

screen.TAA=\
    TAA_ENABLED TAA_SHARPNESS

screen.MODS=\
    [MOD_PHOTONICS]

screen.MOD_PHOTONICS=\
    PHOTONICS_RESTIR_ENABLED PHOTONICS_HAND_LIGHT_ENABLED \
    PHOTONICS_REFLECT_ENABLED PHOTONICS_BLOCK_LIGHT_ENABLED \
    PHOTONICS_BLOCK_TINT_ENABLED PHOTONICS_GI_ENABLED

sliders=\
