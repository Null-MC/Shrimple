variable.float.sunViewDist=sqrt(sunPosition.x * sunPosition.x + sunPosition.y * sunPosition.y + sunPosition.z * sunPosition.z)
variable.vec3.sunViewDir=sunPosition / vec3(sunViewDist, sunViewDist, sunViewDist)

variable.vec3.sunWorldDirTemp=vec3(\
    gbufferModelViewInverse.0.0 * sunViewDir.x + gbufferModelViewInverse.1.0 * sunViewDir.y + gbufferModelViewInverse.2.0 * sunViewDir.z, \
    gbufferModelViewInverse.0.1 * sunViewDir.x + gbufferModelViewInverse.1.1 * sunViewDir.y + gbufferModelViewInverse.2.1 * sunViewDir.z, \
    gbufferModelViewInverse.0.2 * sunViewDir.x + gbufferModelViewInverse.1.2 * sunViewDir.y + gbufferModelViewInverse.2.2 * sunViewDir.z)

variable.float.sunLocalDist=sqrt(sunWorldDirTemp.x * sunWorldDirTemp.x + sunWorldDirTemp.y * sunWorldDirTemp.y + sunWorldDirTemp.z * sunWorldDirTemp.z)
uniform.vec3.sunLocalDir=sunWorldDirTemp / vec3(sunLocalDist, sunLocalDist, sunLocalDist)


uniform.float.nearPlane=near
uniform.float.farPlane=far * 5.0
#uniform.float.nearPlane=-gbufferProjection.2.3 / (gbufferProjection.2.2 + 1.0)
#uniform.float.farPlane=gbufferProjection.2.3 / (1.0 - gbufferProjection.2.2)
#uniform.float.nearPlane=gbufferProjection.2.3 / (gbufferProjection.2.2 - 1.0)
#uniform.float.farPlane=gbufferProjection.2.3 / (gbufferProjection.2.2 + 1.0)

uniform.float.far2=gbufferProjection.2.3 / (1.0 - gbufferProjection.2.2)
uniform.float.far3=gbufferProjection.2.3 / (gbufferProjection.2.2 + 1.0)

uniform.vec2.viewSize=vec2(viewWidth, viewHeight)

variable.float.jitter_x = frac(0.75487766624669276005 * frameCounter + 0.5) - 0.5
variable.float.jitter_y = frac(0.56984029099805326591 * frameCounter + 0.5) - 0.5
uniform.vec2.taa_offset = vec2(jitter_x / viewWidth, jitter_y / viewWidth)

variable.float.jitter_prev_x = frac(0.75487766624669276005 * (frameCounter-1) + 0.5) - 0.5
variable.float.jitter_prev_y = frac(0.56984029099805326591 * (frameCounter-1) + 0.5) - 0.5
uniform.vec2.taa_offset_prev = vec2(jitter_prev_x / viewWidth, jitter_prev_y / viewWidth)

uniform.float.windTime = frameTimeCounter

variable.float.weatherF=0.86*rainStrength + 0.14*thunderStrength
uniform.float.weatherStrength=smooth(weatherF, 8, 32)

variable.float.weatherDensityF=mix(mix(0.0004, 0.0012, rainStrength), 0.0048, thunderStrength)
uniform.float.weatherDensity=smooth(weatherDensityF, 8, 32)

variable.float.sunY= clamp((sunLocalDir.y - -0.1) / (0.3 - -0.1), 0.0, 1.0)
uniform.float.skyDayF= sunY*sunY * (3.0 - 2.0*sunY)

